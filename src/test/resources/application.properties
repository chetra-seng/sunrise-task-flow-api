spring.datasource.url=jdbc:h2:mem:taskflow_test
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Let schema.sql + data.sql manage all DDL — not Hibernate
spring.jpa.hibernate.ddl-auto=none

# Always run SQL init scripts (schema.sql then data.sql)
spring.sql.init.mode=always

# Run SQL scripts AFTER Hibernate initializes (required with ddl-auto=none)
spring.jpa.defer-datasource-initialization=true

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

